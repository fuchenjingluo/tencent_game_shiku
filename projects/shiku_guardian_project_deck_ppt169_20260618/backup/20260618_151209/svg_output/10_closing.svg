<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="closingScrim" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#12110d" stop-opacity="0.92"/>
      <stop offset="58%" stop-color="#12110d" stop-opacity="0.64"/>
      <stop offset="100%" stop-color="#12110d" stop-opacity="0.35"/>
    </linearGradient>
  </defs>
  <g id="background">
    <rect x="0" y="0" width="1280" height="720" fill="#12110d"/>
    <image href="../images/cover_key_art.png" x="0" y="0" width="1280" height="720" preserveAspectRatio="xMidYMid slice"/>
    <rect x="0" y="0" width="1280" height="720" fill="url(#closingScrim)"/>
  </g>
  <g id="closing-message">
    <text x="76" y="188" font-family="KaiTi, Georgia, serif" font-size="58" font-weight="bold" fill="#d7bd73">
      <tspan x="76" dy="0">让保护成为一种</tspan>
      <tspan x="76" dy="70">可被体验的选择</tspan>
    </text>
    <line x1="80" y1="296" x2="530" y2="296" stroke="#d7bd73" stroke-width="3" stroke-opacity="0.65"/>
    <text x="80" y="354" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="24" fill="#f3ead2">
      <tspan x="80" dy="0">《石窟守护者》不把文物保护简化为口号，</tspan>
      <tspan x="80" dy="40">而是让玩家在预算、风险与证据之间，</tspan>
      <tspan x="80" dy="40">亲手理解“守护”的重量。</tspan>
    </text>
  </g>
  <g id="summary-tags">
    <rect x="80" y="520" width="130" height="42" rx="8" fill="#1b1811" fill-opacity="0.82" stroke="#5c4b2c"/>
    <text x="145" y="548" text-anchor="middle" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="17" fill="#f3ead2">文化议题</text>
    <rect x="228" y="520" width="130" height="42" rx="8" fill="#1b1811" fill-opacity="0.82" stroke="#5c4b2c"/>
    <text x="293" y="548" text-anchor="middle" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="17" fill="#f3ead2">策略决策</text>
    <rect x="376" y="520" width="130" height="42" rx="8" fill="#1b1811" fill-opacity="0.82" stroke="#5c4b2c"/>
    <text x="441" y="548" text-anchor="middle" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="17" fill="#f3ead2">叙事操作</text>
    <rect x="524" y="520" width="130" height="42" rx="8" fill="#1b1811" fill-opacity="0.82" stroke="#5c4b2c"/>
    <text x="589" y="548" text-anchor="middle" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="17" fill="#f3ead2">因果回溯</text>
  </g>
  <g id="footer">
    <use data-icon="chunk-filled/shield" x="80" y="626" width="30" height="30" fill="#2fb8a6"/>
    <text x="122" y="649" font-family="Consolas, monospace" font-size="15" fill="#c8b98a">CAVE GUARDIAN · PROJECT DECK</text>
    <text x="1190" y="682" font-family="Consolas, monospace" font-size="12" fill="#8a7a55">10</text>
  </g>
</svg>
