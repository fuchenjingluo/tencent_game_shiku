  <g id="footer">
    <text x="64" y="682" font-family="Consolas, monospace" font-size="12" fill="#8a7a55">CLEAR BOUNDARIES BETWEEN WORLD, UI, AND DATA</text>
    <text x="1190" y="682" font-family="Consolas, monospace" font-size="12" fill="#8a7a55">09</text>
